<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغامرة الحيوانات</title>
    <style>
        body { margin: 0; background: #333; text-align: center; color: white; font-family: sans-serif; overflow: hidden; }
        #gameCanvas { background: #87CEEB; display: block; margin: 0 auto; width: 100vw; height: 80vh; touch-action: none; }
        .controls { padding: 10px; }
        button { padding: 12px 20px; font-size: 18px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; }
        #startBtn { background: #4CAF50; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="score">النقاط: 0</div>
    <canvas id="gameCanvas" width="360" height="480"></canvas>
    <div class="controls">
        <button id="startBtn" onclick="startGame()">ابدأ اللعب</button>
        <br>
        <button onclick="playerChar='🐰'">أرنب 🐰</button>
        <button onclick="playerChar='🐱'">قطة 🐱</button>
        <button onclick="playerChar='🦊'">ثعلب 🦊</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let playerChar = '🐰', x = 150, y = 400, score = 0, isRunning = false, gameOver = false;
        let food = { x: 150, y: -50 };
        let rock = { x: 200, y: -200 };

        // شاشة البداية
        function drawStartScreen() {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.fillText("اختر شخصيتك واضغط ابدأ", 20, 200);
        }

        function startGame() {
            isRunning = true;
            gameOver = false;
            score = 0;
            document.getElementById("score").innerText = "النقاط: 0";
            update();
        }

        function update() {
            if (!isRunning) return;
            
            if (gameOver) {
                ctx.fillStyle = "black";
                ctx.font = "30px Arial";
                ctx.fillText("خسرت! النتيجة: " + score, 60, 240);
                ctx.fillText("اضغط ابدأ للعب مجدداً", 40, 280);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "40px Arial";
            ctx.fillText(playerChar, x, y);
            
            ctx.fillText("🍎", food.x, food.y);
            food.y += 5;
            if (food.y > 480) { food.y = -50; food.x = Math.random() * 300; }

            ctx.fillText("🪨", rock.x, rock.y);
            rock.y += 6;
            if (rock.y > 480) { rock.y = -200; rock.x = Math.random() * 300; }

            if (Math.abs(food.y - y) < 40 && Math.abs(food.x - x) < 40) {
                score++;
                document.getElementById("score").innerText = "النقاط: " + score;
                food.y = -50; food.x = Math.random() * 300;
            }

            if (Math.abs(rock.y - y) < 40 && Math.abs(rock.x - x) < 40) gameOver = true;

            requestAnimationFrame(update);
        }

        window.addEventListener("touchmove", (e) => {
            if(!isRunning) return;
            let rect = canvas.getBoundingClientRect();
            x = (e.touches[0].clientX - rect.left) / (rect.width / canvas.width) - 20;
        });

        drawStartScreen(); // عرض شاشة البداية عند فتح الموقع
    </script>
</body>
</html>
